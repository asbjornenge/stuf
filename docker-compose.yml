services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: stuf
      POSTGRES_PASSWORD: stuf
      POSTGRES_DB: stuf
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stuf"]
      interval: 2s
      timeout: 5s
      retries: 10

  sync:
    image: node:22.5.0-alpine
    working_dir: /app
    command: sh -c "npm install && node --watch index.js"
    environment:
      - MODE=${MODE}
      - PAYMENTS_ENABLED=${PAYMENTS_ENABLED}
      - DATABASE_URL=${DATABASE_URL}
      - VAPID_CONTACT=${VAPID_CONTACT}
      - STRIPE_PRICE_ID=${STRIPE_PRICE_ID}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
    volumes:
      - ./sync:/app
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.stuf-sync.rule=Host(`stuf-sync.coder.surflabs.no`)"
      - "traefik.http.routers.stuf-sync.entrypoints=web"
      - "traefik.http.services.stuf-sync.loadbalancer.server.port=3000"
    networks:
      - proxy
      - default
    depends_on:
      db:
        condition: service_healthy

  app:
    image: node:22.5.0-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      - VITE_HOSTED_SYNC_URL=${VITE_HOSTED_SYNC_URL}
    volumes:
      - ./app:/app
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.stuf.rule=Host(`stuf.coder.surflabs.no`)"
      - "traefik.http.routers.stuf.entrypoints=web"
      - "traefik.http.services.stuf.loadbalancer.server.port=5173"
    networks:
      - proxy
      - default
    depends_on:
      - sync

  landing:
    image: node:22.5.0-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host --port 5174"
    volumes:
      - ./landing:/app
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.stuf-landing.rule=Host(`stuf-landing.coder.surflabs.no`)"
      - "traefik.http.routers.stuf-landing.entrypoints=web"
      - "traefik.http.services.stuf-landing.loadbalancer.server.port=5174"
    networks:
      - proxy
      - default

volumes:
  pgdata:

networks:
  proxy:
    external: true
