services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: stuf
      POSTGRES_PASSWORD: stuf
      POSTGRES_DB: stuf
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stuf"]
      interval: 2s
      timeout: 5s
      retries: 10

  sync:
    image: node:22.5.0-alpine
    working_dir: /app
    command: sh -c "npm install && node --watch index.js"
    ports:
      - "3000:3000"
    environment:
      - MODE=${MODE}
      - PAYMENTS_ENABLED=${PAYMENTS_ENABLED}
      - DATABASE_URL=${DATABASE_URL}
      - VAPID_CONTACT=${VAPID_CONTACT}
      - STRIPE_PRICE_ID=${STRIPE_PRICE_ID}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
    volumes:
      - ./sync:/app
    depends_on:
      db:
        condition: service_healthy

  app:
    image: node:22.5.0-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    environment:
      - VITE_HOSTED_SYNC_URL=${VITE_HOSTED_SYNC_URL}
    volumes:
      - ./app:/app
    depends_on:
      - sync

  landing:
    image: node:22.5.0-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host --port 5174"
    ports:
      - "5174:5174"
    volumes:
      - ./landing:/app

volumes:
  pgdata:
