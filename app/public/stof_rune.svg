<svg width="120" height="200" viewBox="0 0 120 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E85D24"/>
      <stop offset="70%" stop-color="#EF7A30"/>
      <stop offset="100%" stop-color="#F5C030"/>
    </linearGradient>
    <mask id="rune">
      <!-- Stav -->
      <line x1="60" y1="10" x2="60" y2="190" stroke="white" stroke-width="20" stroke-linecap="round"/>
      <!-- Venstre arm -->
      <line x1="22" y1="100" x2="60" y2="124" stroke="white" stroke-width="17" stroke-linecap="round"/>
      <!-- Høyre arm -->
      <line x1="60" y1="124" x2="100" y2="76" stroke="white" stroke-width="17" stroke-linecap="round"/>
    </mask>
  </defs>
  <rect x="0" y="0" width="120" height="200" fill="url(#gC)" mask="url(#rune)"/>
